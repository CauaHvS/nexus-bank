spring.application.name=nexus-bank
server.port=8080

# DataSource - valores sobrescritos por env vars em producao
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/nexusbank}
spring.datasource.username=${DB_USERNAME:nexus}
spring.datasource.password=${DB_PASSWORD:nexus}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false

# Flyway - desabilitado por enquanto (sera habilitado na Fatia 0.2)
spring.flyway.enabled=false

# Redis
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:redis}

# Kafka
spring.kafka.bootstrap-servers=${KAFKA_SERVERS:localhost:9092}

# Actuator
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always

# Logging
logging.level.com.nexusbank=DEBUG
logging.level.org.springframework.modulith=DEBUG
