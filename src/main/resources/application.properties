spring.application.name=nexus-bank
server.port=8080

# DataSource - valores sobrescritos por env vars em producao
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/nexusbank}
spring.datasource.username=${DB_USERNAME:nexus}
spring.datasource.password=${DB_PASSWORD:nexus}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false

# Flyway - gerenciado pelos beans em FlywayConfig; auto-config desabilitado
spring.flyway.enabled=false

# JWT (sobrescrever por env var em producao com chave de 256 bits)
security.jwt.secret=${JWT_SECRET:nexus-bank-secret-key-minimum-256-bits-long-change-in-production}
security.jwt.access-token-ttl-seconds=${JWT_ACCESS_TTL:900}
security.jwt.refresh-token-ttl-seconds=${JWT_REFRESH_TTL:604800}

# SpringDoc
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# Redis
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:redis}

# Kafka
spring.kafka.bootstrap-servers=${KAFKA_SERVERS:localhost:9092}

# Actuator
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always

# Logging
logging.level.com.nexusbank=DEBUG
logging.level.org.springframework.modulith=DEBUG
