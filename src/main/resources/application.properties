spring.application.name=nexus-bank
server.port=8080

# DataSource - valores sobrescritos por env vars em producao
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/nexusbank}
spring.datasource.username=${DB_USERNAME:nexus}
spring.datasource.password=${DB_PASSWORD:nexus}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false

# Flyway - gerenciado pelos beans em FlywayConfig; auto-config desabilitado
spring.flyway.enabled=false

# JWT (sobrescrever por env var em producao com chave de 256 bits)
security.jwt.secret=${JWT_SECRET:nexus-bank-secret-key-minimum-256-bits-long-change-in-production}
security.jwt.access-token-ttl-seconds=${JWT_ACCESS_TTL:900}
security.jwt.refresh-token-ttl-seconds=${JWT_REFRESH_TTL:604800}

# SpringDoc
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# Redis
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:redis}

# Kafka
spring.kafka.bootstrap-servers=${KAFKA_SERVERS:localhost:9092}

# Actuator
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always

# Logging
logging.level.com.nexusbank=DEBUG
logging.level.org.springframework.modulith=DEBUG

# Resilience4j — OutboxPoller (retry com backoff exponencial)
resilience4j.retry.instances.outboxPublish.max-attempts=3
resilience4j.retry.instances.outboxPublish.wait-duration=500ms
resilience4j.retry.instances.outboxPublish.enable-exponential-backoff=true
resilience4j.retry.instances.outboxPublish.exponential-backoff-multiplier=2
resilience4j.retry.instances.outboxPublish.retry-exceptions=org.apache.kafka.common.errors.RetriableException,java.io.IOException

# Resilience4j — Circuit Breaker para publicacao Kafka
resilience4j.circuitbreaker.instances.kafkaPublish.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.kafkaPublish.minimum-number-of-calls=5
resilience4j.circuitbreaker.instances.kafkaPublish.wait-duration-in-open-state=30s
resilience4j.circuitbreaker.instances.kafkaPublish.permitted-number-of-calls-in-half-open-state=3
resilience4j.circuitbreaker.instances.kafkaPublish.sliding-window-type=COUNT_BASED
resilience4j.circuitbreaker.instances.kafkaPublish.sliding-window-size=10
resilience4j.circuitbreaker.instances.kafkaPublish.record-exceptions=java.lang.Exception

# Resilience4j — Bulkhead para transferencias (limite de chamadas simultaneas)
resilience4j.bulkhead.instances.transferInitiate.max-concurrent-calls=20
resilience4j.bulkhead.instances.transferInitiate.max-wait-duration=0

# Resilience4j — Rate Limiter no endpoint de transferencias
resilience4j.ratelimiter.instances.transferEndpoint.limit-for-period=10
resilience4j.ratelimiter.instances.transferEndpoint.limit-refresh-period=1s
resilience4j.ratelimiter.instances.transferEndpoint.timeout-duration=0

# Scheduler de transferencias agendadas (ms)
payments.scheduler.fixed-delay=60000

# Kafka consumer — módulo Notifications
spring.kafka.consumer.group-id=notifications-service
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.enable-auto-commit=false
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer

# Tópicos de referência (nomes hardcoded nos @KafkaListener — aqui apenas para documentação)
notifications.topics.transfer-completed=payments.transfer.completed
notifications.topics.transfer-failed=payments.transfer.failed
notifications.topics.account-opened=corebanking.account.opened

# DLQ de notificações
notifications.dlq.max-retry-count=${NOTIFICATIONS_DLQ_MAX_RETRY:5}
notifications.dlq.reprocess-delay-ms=${NOTIFICATIONS_DLQ_REPROCESS_DELAY:60000}
