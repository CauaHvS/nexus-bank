name: CI

on:
  push:
    branches: [master, main]
  pull_request:

jobs:
  # ------------------------------------------------------------------
  # 1. Backend: build + testes unitários + integração + verify de módulos
  # ------------------------------------------------------------------
  backend:
    name: Backend (Java 21 + Maven)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Configurar Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build, testes e verificação de módulos
        run: ./mvnw clean verify -B

      - name: Publicar relatório de testes
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: target/surefire-reports/
          retention-days: 7

  # ------------------------------------------------------------------
  # 2. Frontend: lint + testes unitários + build
  # ------------------------------------------------------------------
  frontend:
    name: Frontend (Node 20 + Vite)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Configurar Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Instalar dependências
        run: npm ci

      - name: Lint (TypeScript)
        run: npm run lint

      - name: Testes unitários
        run: npm run test

      - name: Build de produção
        run: npm run build

  # ------------------------------------------------------------------
  # 3. E2E (smoke): roda apenas em push para master após backend e frontend passarem
  # ------------------------------------------------------------------
  e2e:
    name: E2E — Smoke (Playwright)
    if: github.event_name == 'push' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main')
    needs: [backend, frontend]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Subir stack completa (infra + app)
        run: docker compose --profile infra --profile app up -d --build
        timeout-minutes: 10

      - name: Aguardar backend saudável
        run: |
          echo "Aguardando nexus-bank-core..."
          timeout 120 bash -c \
            'until curl -sf http://localhost:8080/actuator/health | grep -q "UP"; do sleep 5; done'

      - name: Aguardar frontend (Nginx)
        run: |
          echo "Aguardando nexus-bank-frontend..."
          timeout 60 bash -c \
            'until curl -sf http://localhost:80 > /dev/null; do sleep 3; done'

      - name: Configurar Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: e2e/package-lock.json

      - name: Instalar dependências E2E
        run: npm ci
        working-directory: e2e

      - name: Instalar Playwright (Chromium)
        run: npx playwright install --with-deps chromium
        working-directory: e2e

      - name: Executar testes E2E
        run: npx playwright test
        working-directory: e2e
        env:
          # Playwright navega pelo Nginx (SPA containerizada)
          BASE_URL: http://localhost:80
          # Helpers de setup chamam o backend diretamente
          BACKEND_URL: http://localhost:8080
          CI: true

      - name: Upload relatório de falhas
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: e2e/playwright-report/
          retention-days: 7

      - name: Derrubar stack
        if: always()
        run: docker compose --profile infra --profile app down
